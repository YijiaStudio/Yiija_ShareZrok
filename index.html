<doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title></title>
  <script>
    const fallback = "https://fvjj3vci7wnc.share.zrok.io";
    const raw = "https://raw.githubusercontent.com/YijiaStudio/Zrok/main/last_share_url.txt?ts=" + Date.now();
    fetch(raw, { cache: "no-store" })
      .then(r => r.text())
      .then(t => { const u = t.trim(); window.location.replace(u || fallback); })
      .catch(() => window.location.replace(fallback));
  </script>
</head>
<body style="margin:0;background:#fff;"></body>
</html>
